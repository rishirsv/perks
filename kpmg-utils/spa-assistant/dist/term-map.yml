# Term Map: Canonical Vocabulary for SPA Analysis
# Simplified: synonyms, components, and routing only

pricing_structures:
  completion_accounts:
    detection:
      - "Closing Cash"
      - "Closing Indebtedness"
      - "Working Capital Adjustment"
      - "Net Working Capital"
      - "True-up"
      - "Closing Statement"
      - "Purchase Price Adjustment"

  locked_box:
    detection:
      - "Locked Box"
      - "Locked Box Date"
      - "Leakage"
      - "Permitted Leakage"
      - "no adjustment to the Purchase Price"

  fixed_price:
    detection:
      - "Merger Consideration"
      - "Per Share"
      - "per share of Common Stock"
      - "Exchange Ratio"

  hybrid_net_capital:
    detection:
      - "Net Capital"
      - "Targeted Net Capital"
      - "Rule 15c3-1"
      - "Risk-Based Capital"

  hybrid_fcf:
    detection:
      - "Free Cash Flow"
      - "Closing FCF"
      - "Specified Debt"

definitions:
  indebtedness:
    synonyms:
      - "Indebtedness"
      - "Debt"
      - "Closing Indebtedness"
      - "Closing Debt"
      - "Funded Debt"
      - "Financial Debt"
    components:
      - borrowed_money
      - capital_finance_leases
      - operating_leases
      - accrued_interest
      - breakage_prepayment
      - deferred_purchase_price
      - letters_of_credit
      - guarantees
      - hedging_swaps
      - overdrafts
      - factoring_ar_financing
      - employee_deal_payments
      - pension_erisa
      - intercompany_debt
      - litigation_liabilities
      - deferred_revenue
      - unpaid_taxes
      - trade_payables
    bucket: debt

  cash:
    synonyms:
      - "Cash"
      - "Cash and Cash Equivalents"
      - "Closing Cash"
      - "Available Cash"
      - "Unrestricted Cash"
    components:
      - cash_on_hand
      - cash_equivalents
      - deposits_in_transit
      - outstanding_checks
      - restricted_cash
      - cash_collateral
      - trapped_cash
      - marketable_securities
      - overdrafts
    bucket: cash

  working_capital:
    synonyms:
      - "Working Capital"
      - "Net Working Capital"
      - "NWC"
      - "Closing Working Capital"
      - "Closing Net Working Capital"
    components:
      - accounts_receivable
      - inventory
      - prepaid_expenses
      - accounts_payable
      - accrued_liabilities
      - deferred_revenue
      - cash_and_equivalents
      - current_debt
      - transaction_expenses_accrued
      - income_tax_items
      - intercompany_balances
      - accrued_compensation
    bucket: working_capital

  transaction_expenses:
    synonyms:
      - "Transaction Expenses"
      - "Transaction Costs"
      - "Seller Expenses"
      - "Company Transaction Expenses"
      - "Deal Costs"
    components:
      - investment_banking_fees
      - legal_fees
      - accounting_diligence_fees
      - transaction_bonuses
      - severance_deal_triggered
      - retention_payments
      - employer_payroll_taxes
      - do_tail_premium
      - rwi_premium
      - filing_fees
      - transfer_taxes
    bucket: transaction_expenses

  accounting_principles:
    synonyms:
      - "Accounting Principles"
      - "Applicable Accounting Principles"
      - "Accounting Standards"
      - "Accounting Methodology"
    detection:
      - "GAAP"
      - "IFRS"
      - "past practice"
      - "historical accounting"
      - "consistently applied"

  taxes:
    synonyms:
      - "Tax"
      - "Taxes"
      - "Income Taxes"
    components:
      - income_taxes
      - payroll_taxes
      - sales_use_taxes
      - property_taxes
      - transfer_taxes
      - withholding_taxes
    bucket: tax

  net_debt:
    synonyms:
      - "Net Debt"
      - "Net Cash"
      - "Cash less Indebtedness"
    note: "Usually implicit in formula, not separately defined"

routing:
  # Items that could go multiple places - must route to exactly one

  overdrafts:
    options: [cash, debt]
    typical: debt

  accrued_interest:
    options: [debt, working_capital]
    typical: debt

  employee_deal_payments:
    options: [debt, transaction_expenses]
    typical: transaction_expenses

  tax_payables:
    options: [working_capital, excluded]
    typical: working_capital

  deferred_revenue:
    options: [working_capital, debt]
    typical: working_capital

  litigation_reserves:
    options: [working_capital, debt, excluded]
    typical: working_capital
