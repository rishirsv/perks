name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'

jobs:
  pr:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install skill Node dependencies
        run: npm ci --prefix skills/kpmg-slides

      - name: Validate authoring fragments
        run: npm run schema:validate:authoring

      - name: Regenerate runtime aggregates
        run: npm run onboard:regen

      - name: Fail on dirty generated files
        run: git diff --exit-code -- templates/kpmg-diligence/package/layouts.json generator/runtime/onboarded-registry.index.json generator/runtime/onboarded-registry.generated.js

      - name: Run docs verification
        run: npm run docs:verify

      - name: Run changed layout lane
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npm run test:changed-layouts -- --base-ref "${{ github.event.pull_request.base.sha }}" --head-ref "${{ github.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            npm run test:changed-layouts -- --base-ref "${{ github.event.before }}" --head-ref "${{ github.sha }}"
          else
            npm run test:changed-layouts
          fi

      - name: Run primitive stress lane
        run: npm run test:primitive-stress

      - name: Run PR lane
        run: npm run test:pr

      - name: Sync and verify skill bundle when bundle inputs change
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
            CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          else
            CHANGED="$(git diff --name-only HEAD^ HEAD || true)"
          fi
          if echo "$CHANGED" | grep -E '^(generator/|templates/|presets/authoring/|scripts/sync-skill-bundle.mjs|scripts/verify-skill-bundle.mjs|skills/kpmg-slides/)' >/dev/null; then
            npm run skill:sync
            git diff --exit-code -- skills/kpmg-slides
            npm run skill:verify -- --skip-smoke
          else
            echo "Skill bundle inputs unchanged; skipping skill verification."
          fi

  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install skill Node dependencies
        run: npm ci --prefix skills/kpmg-slides

      - name: Validate authoring fragments
        run: npm run schema:validate:authoring

      - name: Install system packages for visual runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils

      - name: Install Python dependencies for visual runtime
        run: python -m pip install pdf2image Pillow python-pptx numpy

      - name: Run nightly lane
        run: npm run test:nightly
