name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'

jobs:
  pr:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install skill Node dependencies
        run: npm ci --prefix skills/kpmg-slides

      - name: Run PR lane
        run: npm run test:pr

  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install skill Node dependencies
        run: npm ci --prefix skills/kpmg-slides

      - name: Install system packages for visual runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils

      - name: Install Python dependencies for visual runtime
        run: python -m pip install pdf2image Pillow python-pptx numpy

      - name: Run nightly lane
        run: npm run test:nightly
