ignore:
  - "Heading 1"
  - "Heading 2"
  - "Bullet 1"
  - "Bullet 2"
  - "Click to add title"
  - "Click to add subtitle"
  - "Click to add text"
  - "First item"
  - "Second item"

placeholders:
  - pattern: '\[[^\]]+\]'
    type: regex
  - pattern: "Call-out box."
    type: literal
  - pattern: "Second level"
    type: literal
  - pattern: "Third level"
    type: literal
  - pattern: "Left"
    type: literal
  - pattern: "Right"
    type: literal
  - pattern: "50-50 text box"
    type: literal

misspellings:
  accomodate: accommodate
  accomodation: accommodation
  seperate: separate
  occurence: occurrence
  recieve: receive
  definately: definitely

terminology:
  - ["QoE", "QofE", "Quality of Earnings"]
  - ["Adj. EBITDA", "Adjusted EBITDA", "Adj EBITDA"]
  - ["LTM", "L.T.M.", "Last Twelve Months"]
  - ["YoY", "Y-o-Y", "Year-over-Year"]

style:
  fy_pattern: 'FY\s?''?\d{2,4}'
  units_pattern: '\$[''"]?[mMkK]{1,2}'
  date_pattern: '\d{1,2}[/-]\d{1,2}[/-]\d{2,4}'
