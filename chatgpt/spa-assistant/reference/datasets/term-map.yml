    common_pitfalls:
      - "Enterprise Value is adjusted for items that are also adjusted elsewhere (silent double count)."
      - "Purchase vs subscription closing times differ without allocating cash movements and responsibilities."
      - "Waterfall/rounding mechanics shift value between legs in non-obvious ways."
    exceptions:
      - "In a single-buyer deal, subscription mechanics may be absent; do not force this bucket unless the text indicates a subscription/co-invest structure."
      - "Separate closing times can be intentional; the agreement should allocate value drift between closings."
