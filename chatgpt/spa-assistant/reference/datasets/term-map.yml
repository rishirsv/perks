    typical_formula_role: special mechanic
    detection_keywords:
      - "earn-out"
      - "earnout"
      - "contingent consideration"
      - "reverse earnout"
      - "measurement period"
      - "earn-out statement"
      - "earn-out dispute"
      - "expert determination"
      - "purchase accounting"
    common_pitfalls:
      - "Metric is defined but accounting rules are not locked, allowing reclassification games."
      - "Operational covenants are missing or too vague to protect the earn-out calculation."
      - "Offsets and set-offs are permitted without clear guardrails."
    exceptions:
      - "Reverse earn-outs flip payment direction; apply the same rigor in calculation and dispute mechanics."
      - "Earn-out statements often exclude purchase accounting unless expressly intended."

