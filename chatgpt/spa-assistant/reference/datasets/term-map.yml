    display_name: "Earn-outs / reverse earn-outs"
    synonyms:
      - Earn-Out Amount
      - Earn-Out Payment
      - Earn-Out Statement
      - Contingent Consideration
      - Reverse Earnout Amount
      - Earn-Out Period
      - Earn-Out Target
