    detection_keywords:
      - "cash-out options"
      - "in-the-money"
      - "out-of-the-money"
      - "phantom equity"
      - "option plan"
      - "warrant"
      - "paying agent"
      - "reserve account"
      - "withholding"
    common_pitfalls:
      - "Award payouts are treated as a Cash adjustment item rather than consideration allocation."
      - "Reserve mechanics operate like an escrow but lack governance and release protections."
      - "Withholding and payroll tax mechanics are unclear or over-broad."
    exceptions:
      - "Some awards are rolled over rather than cashed out; ensure the agreement states which awards and the treatment."
      - "Where a reserve is required for withholding, it should be time-limited and tied to actual remittance."

  - canonical_id: locked_box_leakage_ticker
    display_name: "Locked box / leakage / ticker"
    synonyms:
      - Leakage
      - Permitted Leakage
      - Known Leakage Amount
      - Locked Box Date
      - Locked Box Accounts
      - Leakage Interest
      - Leakage Expert
