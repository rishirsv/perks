    typical_formula_role: special mechanic
    detection_keywords:
      - "locked box"
      - "locked box date"
      - "locked box accounts"
      - "leakage"
      - "permitted leakage"
      - "ticker"
      - "leakage interest"
      - "leakage claim"
      - "leakage expert"
    common_pitfalls:
      - "Permitted Leakage is not fully scheduled, leaving disputes over what is allowed."
      - "Tax leakage and interest/ticker calculations are not defined or are inconsistent."
      - "Expert roles for leakage vs consideration overlap or conflict."
    exceptions:
      - "Completion accounts deals may have no locked box; do not apply leakage concepts unless the structure indicates locked box."
      - "Some leakage items are intended to be permitted; ensure they are scheduled and capped if needed."

  - canonical_id: consortium_subscription_constructs
    display_name: "Consortium / subscription constructs"
    synonyms:
      - Established Enterprise Value
      - Enterprise Value
      - Aggregate Subscription Price
      - Subscription Price
      - Ares Subscription Price
      - CDPQ Subscription Price
      - Purchase Price Proportionate Share
