buckets:
  - canonical_id: purchase_price_consideration
    display_name: "Purchase Price / Consideration"
    synonyms:
      - Adjusted Purchase Price
      - Base Purchase Price
      - Purchase Price
      - Aggregate Purchase Price
      - Consideration
      - Total Consideration
      - Cash Consideration
      - Deferred Consideration
      - Final Purchase Price
      - Estimated Purchase Price
      - Closing Purchase Price
      - Provisional Purchase Price
      - Purchase Price Adjustment
      - Adjustment Amount
      - Purchase Price Escrow Amount
    tags:
      [
        "purchase_price",
        "consideration",
        "adjustment_formula",
        "payment_mechanics",
      ]
    typical_formula_role: price adjustment input
    detection_keywords:
      - "purchase price"
      - "consideration"
      - "base purchase price"
      - "adjusted purchase price"
      - "cash-free"
      - "debt-free"
      - "working capital adjustment"
      - "true-up"
      - "purchase price adjustment"
      - "closing payment"
    common_pitfalls:
      - "Defined terms in the formula do not match the definitions section."
      - "Escrow funding is treated both inside and in addition to Purchase Price (double charge)."
      - "No formula-level anti-duplication allows overlap items to be deducted twice."
    exceptions:
      - "Locked-box deals may have no completion accounts true-up but still need leakage/ticker alignment."
      - "Mixed consideration (cash/equity/rollover) can hide additional deductions outside the adjustment formula."

  - canonical_id: cash
    display_name: "Cash (Cash and Cash Equivalents; Restricted Cash)"
    synonyms:
      - Cash
      - Closing Cash
      - Cash and Cash Equivalents
      - Cash and Cash Equivalents Amount
      - Closing Cash Amount
      - Target Cash
      - Cash Adjustment Amount
      - Restricted Cash
      - Restricted Cash Amount
      - Negative Cash
      - Cash Target
    tags: ["cash", "cash_equivalents", "restricted_cash", "price_adjustment"]
    typical_formula_role: price adjustment input
    detection_keywords:
      - "cash and cash equivalents"
      - "restricted cash"
      - "blocked account"
      - "outstanding checks"
      - "deposits in transit"
      - "uncleared checks"
      - "overdraft"
      - "negative cash"
      - "cash target"
      - "cash adjustment"
    common_pitfalls:
      - "Restricted Cash is included without an availability test (buyer pays for trapped cash)."
      - "Overdrafts are not placed in exactly one bucket (Cash vs Indebtedness) creating double count risk."
      - "Cash is included in Working Capital and also adjusted separately."
    exceptions:
      - "Some SPAs define Net Working Capital to include Cash; if so, the separate Cash adjustment must be switched off or netted."
      - "Checks issued and deposits in transit often require explicit treatment tied to the cut-off time."

  - canonical_id: indebtedness_debt_like
    display_name: "Indebtedness / Debt-like"
    synonyms:
      - Indebtedness
      - Closing Indebtedness
      - Debt
      - Closing Debt
      - External Debt
      - Internal Debt
      - Intercompany Payable Debt
      - Intercompany Receivable Debt
      - Outstanding Indebtedness
      - Debt-like
      - Debt Items
    tags: ["indebtedness", "debt_like", "payoff", "net_debt_input"]
    typical_formula_role: price adjustment input
    detection_keywords:
      - "indebtedness"
      - "debt"
      - "borrowed money"
      - "accrued interest"
      - "guarantee"
      - "letter of credit"
      - "lease liability"
      - "breakage"
      - "cash management"
      - "payoff letter"
    common_pitfalls:
      - "Indebtedness overlaps with Transaction Expenses and/or Taxes without an express no-duplication rule."
      - "Intercompany balances are included without clarifying whether they are settled pre-close."
      - "Payoff schedules are narrower than the definition, leaving residual debt disputes."
    exceptions:
      - "Some deals intentionally exclude trade payables because they are captured in Working Capital."
      - "Overdrafts may be placed in Indebtedness, but only if excluded from Cash."

  - canonical_id: net_debt
    display_name: "Net Debt"
    synonyms:
      - Net Debt
      - Closing Net Debt
      - Estimated Net Debt
      - Final Net Debt
      - Net Debt Statement
      - Draft Net Debt Statement
      - Estimated Net Debt Statement
      - Final Net Debt Statement
    tags: ["net_debt", "cash_minus_debt", "statement_package"]
    typical_formula_role: price adjustment input
    detection_keywords:
      - "net debt"
      - "debt minus cash"
      - "cash minus debt"
      - "net debt statement"
      - "draft net debt"
      - "estimated net debt"
      - "final net debt"
      - "without duplication"
      - "unpaid transaction expenses"
    common_pitfalls:
      - "Net Debt and Working Capital are prepared under different Accounting Principles, creating drift."
      - "Items can move between Net Debt and Working Capital post-close (classification gaming)."
      - "Net Debt statements omit a template or tie-out to trial balance."
    exceptions:
      - "Some Net Debt definitions include Transaction Expenses or Unpaid Transaction Expenses; ensure they are excluded elsewhere without duplication."
      - "Sign conventions vary; confirm the direction in the Purchase Price formula."

  - canonical_id: working_capital_nwc
    display_name: "Working Capital / Net Working Capital"
    synonyms:
      - Working Capital
      - Closing Working Capital
      - Target Working Capital
      - Working Capital Statement
      - Net Working Capital
      - Closing Net Working Capital
      - Target Net Working Capital
      - Working Capital Adjustment Amount
      - Purchase Price Adjustment
      - Working Capital Adjustment
    tags:
      [
        "working_capital",
        "net_working_capital",
        "peg_target",
        "price_adjustment",
      ]
    typical_formula_role: price adjustment input
    detection_keywords:
      - "working capital"
      - "net working capital"
      - "current assets"
      - "current liabilities"
      - "target working capital"
      - "peg"
      - "working capital statement"
      - "closing balance sheet"
      - "past practice"
      - "sample calculation"
    common_pitfalls:
      - "Cash is embedded in Net Working Capital and also adjusted separately as Cash."
      - "Targets/pegs are defined but not tied to a statement template or methodology schedule."
      - "No 'without duplication' across Working Capital vs Debt vs Transaction Expenses vs Taxes."
    exceptions:
      - "Some SPAs intentionally include Cash in NWC; if so, carve Cash out of the separate Cash adjustment."
      - "Tax items are sometimes excluded from Working Capital because they are handled via tax settlement/indemnity."

  - canonical_id: transaction_expenses
    display_name: "Transaction Expenses"
    synonyms:
      - Transaction Expenses
      - Actual Transaction Expenses
      - Estimated Transaction Expenses
      - Unpaid Transaction Expenses
      - Estimated Unpaid Transaction Expenses
      - Actual Unpaid Transaction Expenses
      - Closing Transaction Expenses
      - Transaction Expense Amount
      - Transaction-Related Expenses
    tags: ["transaction_expenses", "deal_costs", "price_adjustment"]
    typical_formula_role: price adjustment input
    detection_keywords:
      - "transaction expenses"
      - "deal fees"
      - "success fee"
      - "advisory fees"
      - "legal fees"
      - "banker fees"
      - "financing fees"
      - "change-of-control"
      - "retention bonus"
      - "employer payroll taxes"
    common_pitfalls:
      - "The same cost is captured in Transaction Expenses and also in Indebtedness and/or Working Capital accruals."
      - "Timing for 'unpaid' is ambiguous (invoice date vs service date vs accrual as of cut-off)."
      - "Employer payroll taxes on bonuses are not specified and become surprise deductions."
    exceptions:
      - "Some deals treat Transaction Expenses as debt-like; if so, exclude them from both Indebtedness and any standalone deduction."
      - "RWI premium allocation varies, but it should not be charged twice."

  - canonical_id: taxes
    display_name: "Taxes"
    synonyms:
      - Taxes
      - Tax
      - Pre-Closing Taxes
      - Transfer Taxes
      - Straddle Period
      - Pre-Closing Tax Period
      - Tax Returns
      - Tax Authority
      - Tax Refund
      - Tax Benefit
    tags: ["taxes", "pre_closing", "straddle", "withholding", "transfer_taxes"]
    typical_formula_role: price adjustment input
    detection_keywords:
      - "taxes"
      - "tax return"
      - "straddle period"
      - "pre-closing tax"
      - "transfer taxes"
      - "withholding"
      - "gross-up"
      - "tax authority"
      - "interest and penalties"
      - "tax indemnity"
    common_pitfalls:
      - "Taxes are accrued in Working Capital and also recovered via a tax settlement/indemnity (double count)."
      - "Transfer Taxes are not clearly allocated between buyer and seller."
      - "Withholding/gross-up mechanics conflict with the consideration definition."
    exceptions:
      - "Some SPAs handle tax economics entirely through indemnities/covenants; overlap with Working Capital must still be prevented."
      - "Income taxes for straddle periods are often allocated differently than non-income taxes; ensure the method is stated."

  - canonical_id: statements_package
    display_name: "Statements package (Closing Statement; dispute process)"
    synonyms:
      - Closing Statement
      - Estimated Closing Statement
      - Draft Closing Statement
      - Final Closing Statement
      - Closing Statements
      - Draft Closing Statements
      - Closing Balance Sheet
      - Closing Working Capital Statement
      - Closing Net Debt Statement
      - Dispute Notice
      - Independent Accountant
      - Final Statements
    tags:
      [
        "closing_accounts",
        "closing_statement",
        "dispute_process",
        "statement_package",
      ]
    typical_formula_role: statement package
    detection_keywords:
      - "closing statement"
      - "estimated closing"
      - "draft closing"
      - "final statement"
      - "dispute notice"
      - "objection notice"
      - "independent accountant"
      - "expert determination"
      - "final and binding"
      - "manifest error"
    common_pitfalls:
      - "No priority order between the agreement, templates, past practice, and GAAP/IFRS."
      - "Independent Accountant scope is not limited to disputed items."
      - "Timelines for delivery/objection are too short to validate the calculations."
    exceptions:
      - "Some deals use separate statements (e.g., Net Debt Statement + Working Capital Statement); the methodology and dispute process must align."
      - "A manifest error carve-out can coexist with a disputed-items-only scope if drafted carefully."

  - canonical_id: accounting_principles_hierarchy
    display_name: "Accounting Principles / Hierarchy"
    synonyms:
      - Accounting Principles
      - Company Accounting Principles
      - Closing Balance Sheet Principles
      - Accounting Standards
      - GAAP
      - IFRS
      - Past Practice
      - Sample Calculation
      - Illustrative Example
      - Sample Statement
    tags: ["accounting_principles", "gaap_ifrs", "past_practice", "templates"]
    typical_formula_role: statement package
    detection_keywords:
      - "accounting principles"
      - "gaap"
      - "ifrs"
      - "consistent with past practice"
      - "sample calculation"
      - "illustrative example"
      - "order of priority"
      - "no hindsight"
      - "consistently applied"
      - "classification"
    common_pitfalls:
      - "No hierarchy allows disputes between GAAP and past practice."
      - "Accounting policies can be changed post-close, enabling reclassification between buckets."
      - "Anti-duplication is assumed rather than stated."
    exceptions:
      - "A pure-GAAP deal may intentionally omit past-practice concepts, but then templates/examples must be complete."
      - "If specific departures from GAAP/IFRS are intended, list them explicitly in the agreement or schedules."

  - canonical_id: anti_duplication
    display_name: "Anti-duplication constructs"
    synonyms:
      - "without duplication"
      - "without double counting"
      - "no double counting"
      - "not counted more than once"
      - "to avoid duplication"
      - "for greater certainty (no duplication)"
    tags: ["anti_duplication", "overlap_controls", "classification_lock"]
    typical_formula_role: statement package
    detection_keywords:
      - "without duplication"
      - "without double counting"
      - "not counted more than once"
      - "to the extent included"
      - "shall not be included in both"
      - "avoid duplication"
      - "double recovery"
    common_pitfalls:
      - "Anti-duplication appears only inside one definition instead of at the formula level."
      - "Overlap items (Taxes, Transaction Expenses, intercompany, overdrafts) are not routed to a single bucket."
      - "The dispute expert is asked to fix overlap without clear drafting authority."
    exceptions:
      - "Even if each definition has a carve-out, a formula-level anti-duplication sentence is often needed."
      - "Locked-box leakage constructs still require no-duplication across leakage claims and consideration adjustments."

  - canonical_id: cutoff_measurement_times
    display_name: "Cut-off / Measurement times"
    synonyms:
      - Closing Time
      - Calculation Time
      - Reference Time
      - Effective Time
      - Purchase Closing Time
      - Subscription Closing Time
      - Measurement Time
      - Determination Time
      - Closing Date/Time
    tags: ["cutoff_time", "measurement_time", "timing"]
    typical_formula_role: statement package
    detection_keywords:
      - "closing time"
      - "calculation time"
      - "reference time"
      - "effective time"
      - "immediately prior to closing"
      - "as of"
      - "11:59 p.m."
      - "12:01 a.m."
      - "purchase closing time"
      - "subscription closing time"
    common_pitfalls:
      - "Different cut-off times apply to Cash vs Debt vs Working Capital vs Expenses, causing mismatched numbers."
      - "Deposits in transit and outstanding checks are not addressed at the cut-off time."
      - "Separate purchase vs subscription closing times are defined without allocating value drift."
    exceptions:
      - "Separate Purchase Closing Time and Subscription Closing Time may be intentional; the agreement must allocate cash movements and responsibilities."
      - "If measurement is at the Effective Time, ensure it is consistently applied to all calculations."

  - canonical_id: escrows_holdbacks_reserves
    display_name: "Escrows / Holdbacks / Reserves"
    synonyms:
      - Escrow Amount
      - Adjustment Escrow Amount
      - Adjustment Escrow Fund
      - Purchase Price Escrow Amount
      - Indemnity Escrow Amount
      - Escrow Fund
      - Holdback Amount
      - Reserve Amount
      - Reserve Account
      - Escrow Agreement
      - Escrow Agent
    tags: ["escrow", "holdback", "reserve_account", "recourse"]
    typical_formula_role: recourse plumbing
    detection_keywords:
      - "escrow"
      - "holdback"
      - "reserve account"
      - "escrow agent"
      - "escrow agreement"
      - "adjustment escrow"
      - "indemnity escrow"
      - "release instructions"
      - "escrow termination"
      - "interest on escrow"
    common_pitfalls:
      - "Adjustment escrow and indemnity/recourse escrows are not clearly separated or prioritized."
      - "Interest, investment, and release mechanics are not specified."
      - "Reserve accounts operate like shadow escrows without governance and dispute protections."
    exceptions:
      - "RWI deals may replace an indemnity escrow with a retention escrow; confirm which escrow secures what obligation."
      - "A reserve held by a paying agent should mirror escrow-style release and dispute protections."

  - canonical_id: wi_insurance_retention
    display_name: "R&W / W&I Insurance + retention"
    synonyms:
      - R&W Insurance Policy
      - R&W Policy
      - R&W Insurer
      - R&W Policy Excess Amount
      - R&W Retention Amount
      - R&W Retention Escrow Amount
      - Representation and Warranty Policy
      - W&I Insurance Policy
      - W&I Insurer
      - W&I Insurance Costs
      - Insurance Contract
    tags: ["rwi", "wi_insurance", "retention", "retention_escrow", "recourse"]
    typical_formula_role: recourse plumbing
    detection_keywords:
      - "w&i insurance"
      - "representation and warranty insurance"
      - "retention"
      - "retention escrow"
      - "policy excess"
      - "premium"
      - "insurer"
      - "claims process"
      - "broker"
      - "policy schedule"
    common_pitfalls:
      - "Premium/costs are captured as Transaction Expenses and also funded/deducted elsewhere (double charge)."
      - "Retention escrow release timing/conditions are unclear."
      - "Claim scoping terms do not align with the insurance policy or any residual indemnity."
    exceptions:
      - "Premium allocation varies, but it must be charged once and aligned with the payment mechanics."
      - "Some deals keep a residual seller indemnity even with RWI; confirm how it interacts with retention and escrow."

  - canonical_id: do_tail_policy
    display_name: "D&O tail policy"
    synonyms:
      - D&O Tail Policy
      - D&O Tail
      - "D&O run-off policy"
      - Tail Policy
    tags: ["do_tail", "run_off", "transaction_cost", "recourse"]
    typical_formula_role: recourse plumbing
    detection_keywords:
      - "d&o tail"
      - "run-off"
      - "tail policy"
      - "tail premium"
      - "directors and officers"
      - "policy term"
      - "who pays"
    common_pitfalls:
      - "D&O tail premium is treated as a Transaction Expense and also withheld via escrow/reserve (double charge)."
      - "Policy term, insured parties, and effective date are not specified."
      - "Closing timing concepts create ambiguity on who bears the premium."
    exceptions:
      - "D&O tail can be seller-borne or company-borne; either way, assign it to one bucket and reflect it once."
      - "If a reserve is used, it should mirror escrow-style release and dispute protections."

  - canonical_id: setoff_offset_rights
    display_name: "Set-off / offset rights"
    synonyms:
      - set-off
      - set off
      - offset
      - netting
      - recoupment
      - withhold
      - deduct
      - "net of"
    tags: ["setoff", "offset_rights", "payment_mechanics", "recourse"]
    typical_formula_role: recourse plumbing
    detection_keywords:
      - "set-off"
      - "offset"
      - "netting"
      - "recoup"
      - "deduct from"
      - "withhold payment"
      - "net against"
      - "no set-off"
    common_pitfalls:
      - "Set-off is permitted broadly without limitation to a specific obligation or fund (leverage shift)."
      - "Set-off is allowed before final determination of a claim, creating unilateral netting risk."
      - "Set-off rights conflict with an intended sole recourse (e.g., escrow-only recovery)."
    exceptions:
      - "Set-off is sometimes limited to the final purchase price adjustment settlement; if so, carve out other claims."
      - "Some deals prohibit set-off entirely except against a specified escrow fund."

