<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FDD scope library viewer</title>
    <style>
      :root {{
        --bg: #0b0f14;
        --panel: #111826;
        --muted: #9aa4b2;
        --text: #e5e7eb;
        --accent: #60a5fa;
        --border: #243244;
      }}
      body {{
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        line-height: 1.3;
      }}
      header {{
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(17, 24, 38, 0.7);
        position: sticky;
        top: 0;
        backdrop-filter: blur(8px);
        z-index: 2;
      }}
      .row {{
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }}
      h1 {{
        font-size: 14px;
        margin: 0;
        font-weight: 600;
      }}
      .muted {{ color: var(--muted); font-size: 12px; }}
      .wrap {{
        display: grid;
        grid-template-columns: 340px 1fr;
        min-height: calc(100vh - 56px);
      }}
      aside {{
        border-right: 1px solid var(--border);
        background: var(--panel);
        padding: 12px;
        overflow: auto;
      }}
      main {{
        padding: 16px;
        overflow: auto;
      }}
      input, select {{
        background: #0f1624;
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 13px;
      }}
      .list {{
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }}
      .item {{
        padding: 10px 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
      }}
      .item:hover {{ border-color: #36517a; }}
      .item.active {{ border-color: var(--accent); }}
      .badge {{
        display: inline-block;
        padding: 2px 6px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
        margin-left: 6px;
      }}
      .section-title {{
        font-size: 18px;
        margin: 0 0 6px 0;
      }}
      .section-meta {{
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 12px;
      }}
      ul {{
        margin: 8px 0 0 18px;
        padding: 0;
      }}
      li {{
        margin: 6px 0;
      }}
      .idx {{
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        margin-right: 6px;
      }}
      .highlight {{
        outline: 1px solid rgba(96, 165, 250, 0.35);
        border-radius: 6px;
        padding: 2px 4px;
      }}
      .pill {{
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(96, 165, 250, 0.12);
        border: 1px solid rgba(96, 165, 250, 0.25);
        color: #cfe6ff;
        font-size: 12px;
      }}
    </style>
  </head>
  <body>
    <header>
      <div class="row">
        <h1>FDD scope library viewer</h1>

    <div class="wrap">
      <aside>

        </div>
        <div class="muted" style="margin-top:8px;">

        </div>
        <div class="list" id="sections"></div>
      </aside>
      <main>
        <div id="detail">
          <div class="muted">select a section on the left</div>
        </div>
      </main>

stry": "healthcare", "section_key": "waterfall_revenue_analysis", "display_heading": "Waterfall Revenue Analysis", "bullets": ["If available, obtain patient/encounter-level detail from the billing and collections systems utilized by Target to perform a claims-level revenue analysis reflecting net cash received on closed claims, and estimated cash expected to be received on open claims (based on historical reimbursement trends). Discuss with management:", "Drivers of monthly/quarterly/annual net revenue trends:", "By location (8 clinic locations and 2 de novo locations);", "By significant payor; and", "By significant service code.", "Reimbursement trends by payor, by service, and by location;", "Pricing/volume trends by location by payor by service;", "Payor mix in total and by location;", "Trends and drivers of fluctuation in the cash collection cycle;", "Reconciliation of cash collections reported in the billing system to third-party bank statements (on a sample basis);", "Reconciliation of billing and collection information to financial statements; and", "Bridge revenue for the following changes:", "Patient volumes;", "Same store, de novo, and acquired facilities; and", "Changes in direct and indirect operating expense"], "schema_nodes": [{"i": 0, "id": "scope.3172c0a7", "children": [{"i": 1, "children": [{"i": 2}, {"i": 3}, {"i": 4}, {"i": 5}, {"i": 6}, {"i": 7}, {"i": 8}, {"i": 9}, {"i": 10}]}]}, {"i": 11, "id": "scope.7e98d567", "children": [{"i": 12}, {"i": 13}, {"i": 14}]}]}, {"kind": "industry", "industry": "healthcare", "section_key": "audit_working_papers", "display_heading": "Audit Working Papers", "bullets": ["Obtain and read the auditor's working papers for the latest fiscal year:", "Comment on the nature and volume of audit differences (recorded and unrecorded adjustments), use of accounting estimates, any changes in accounting policies or methods; and", "Comment on control issues identified by the external auditors, if applicable.", "Comment on any additional \"red flags\" or key risks as identified in the provided audit materials", "Review of the audit committee reporting and presentations from the audit firm"], "schema_nodes": [{"i": 0, "id": "scope.c6bfcd71"}, {"i": 1, "id": "scope.046b25f0"}, {"i": 2, "id": "scope.05f495e9"}, {"i": 3, "id": "scope.707155ac"}, {"i": 4, "id": "scope.297a2857"}]}]</script>
    <script>
      const sections = JSON.parse(document.getElementById('data').textContent);

      function firstWord(text) {{
        const m = text.trim().match(/^[\W_]*(\w+)/);
        return (m ? m[1] : '').toLowerCase();
      }}

      const DIRECTIVE = new Set(["analyze", "assess", "bridge", "calculate", "collect", "comment", "compare", "confirm", "consider", "determine", "develop", "discuss", "evaluate", "gain", "identify", "inquire", "meet", "obtain", "perform", "prepare", "propose", "provide", "read", "reconcile", "review", "segment", "summarize", "test", "understand"]);
      function looksLikeNewDirective(text) {{
        const w = firstWord(text);
        return DIRECTIVE.has(w) && text.trim().split(/\s+/).length >= 3;
      }}

      function parseBullets(bullets) {{
        const root = [];
        const stack = [];
        function add(text, idx) {{
          const node = {{ text, idx, children: [] }};
          if (stack.length) stack[stack.length - 1].children.push(node);
          else root.push(node);
          return node;
        }}
        bullets.forEach((b, i) => {{
          if (typeof b !== 'string') return;
          const text = b.trim();
          if (!text) return;
          if (text.endsWith(':')) {{
            if (looksLikeNewDirective(text)) stack.length = 0;
            const node = add(text, i);
            stack.push(node);
            return;
          }}
          if (stack.length && looksLikeNewDirective(text)) stack.length = 0;
          add(text, i);
        }});
        return root;
      }}

      function parseSchema(bullets, schemaNodes) {{
        function build(node) {{
          const i = Number(node.i);
          const text = (i >= 0 && i < bullets.length && typeof bullets[i] === 'string') ? bullets[i].trim() : '';
          const children = (node.children || []).map(build);
          return {{ text, idx: i, children }};
        }}
        return (schemaNodes || []).map(build);
      }}

      const groups = new Map();
      groups.set('common', sections.filter(s => s.kind === 'common'));
      const industries = Array.from(new Set(sections.filter(s => s.kind === 'industry').map(s => s.industry))).sort();
      industries.forEach(ind => groups.set(ind, sections.filter(s => s.kind === 'industry' && s.industry === ind)));

      const groupSelect = document.getElementById('group');
      industries.forEach(ind => {{
        const opt = document.createElement('option');
        opt.value = ind;
        opt.textContent = ind;
        groupSelect.appendChild(opt);
      }});

      const q = document.getElementById('q');
      const list = document.getElementById('sections');
      const detail = document.getElementById('detail');
      let activeKey = null;

      function computeCounts(section) {{
        const bullets = section.bullets || [];
        const total = bullets.filter(b => typeof b === 'string' && b.trim()).length;
        const nodes = (section.schema_nodes && section.schema_nodes.length) ? parseSchema(bullets, section.schema_nodes) : parseBullets(bullets);
        return {{ total, top: nodes.length }};
      }}

      function renderList() {{
        const g = groupSelect.value;
        const items = groups.get(g) || [];
        const query = q.value.trim().toLowerCase();
        list.innerHTML = '';
        items.forEach((s, idx) => {{
          const key = `${g}:${s.section_key}`;
          const counts = computeCounts(s);
          const label = s.display_heading;
          const matches = !query || JSON.stringify(s.bullets || []).toLowerCase().includes(query) || label.toLowerCase().includes(query);
          if (!matches) return;
          const el = document.createElement('div');
          el.className = 'item' + (activeKey === key ? ' active' : '');
          el.innerHTML = `
            <div style="font-weight:600; font-size:13px;">${label}</div>
            <div class="muted" style="margin-top:4px;">
              ${counts.top} top-level <span class="badge">${counts.total} total</span>
            </div>
          `;
          el.onclick = () => {{ activeKey = key; renderList(); renderDetail(s); }};
          list.appendChild(el);
        }});
      }}

      function renderNodes(nodes, query) {{
        const ul = document.createElement('ul');
        nodes.forEach(n => {{
          const li = document.createElement('li');
          const text = n.text;
          const hit = query && text.toLowerCase().includes(query);
          const span = document.createElement('span');
          span.innerHTML = `<span class="idx">[${String(n.idx).padStart(2,'0')}]</span>` + (hit ? `<span class="highlight">${text}</span>` : text);
          li.appendChild(span);
          if (n.children && n.children.length) li.appendChild(renderNodes(n.children, query));
          ul.appendChild(li);
        }});
        return ul;
      }}

      function renderDetail(section) {{
        const query = q.value.trim().toLowerCase();
        const bullets = section.bullets || [];
        const nodes = (section.schema_nodes && section.schema_nodes.length) ? parseSchema(bullets, section.schema_nodes) : parseBullets(bullets);
        const counts = computeCounts(section);
        detail.innerHTML = '';
        const h = document.createElement('div');
        h.innerHTML = `
          <h2 class="section-title">${section.display_heading}</h2>
          <div class="section-meta">
            <span class="pill">${section.kind === 'common' ? 'common skeleton' : 'industry: ' + section.industry}</span>
            <span class="badge">${counts.top} top-level</span>
            <span class="badge">${counts.total} total</span>
            <span class="badge">key: ${section.section_key}</span>
          </div>
        `;
        detail.appendChild(h);
        detail.appendChild(renderNodes(nodes, query));
      }}

      groupSelect.onchange = () => {{ activeKey = null; detail.innerHTML = '<div class="muted">select a section on the left</div>'; renderList(); }};
      q.oninput = () => {{ renderList(); if (activeKey) {{
        const [g,key] = activeKey.split(':');
        const items = groups.get(g) || [];
        const found = items.find(s => s.section_key === key);
        if (found) renderDetail(found);
      }} }};

      renderList();
    </script>
  </body>
