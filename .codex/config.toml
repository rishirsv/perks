# Repo-local Codex config for perks.
# Supplements ~/.codex/config.toml when this trusted repository is open.

approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"

[tools]
view_image = true

[features]
apps = true
hooks = true
memories = true
prevent_idle_sleep = true
undo = true

[agents]
max_threads = 6
max_depth = 1

[apps._default]
enabled = true
open_world_enabled = true
destructive_enabled = true
