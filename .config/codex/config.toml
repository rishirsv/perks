# Codex Configuration - Permissive Setup
# Location: ~/.codex/config.toml

################################################################################
# Approval & Sandbox (fully permissive)
################################################################################

approval_policy = "never"
sandbox_mode = "danger-full-access"
model = "gpt-5.3-codex"
plan_mode_reasoning_effort = "high"
personality = "friendly"
suppress_unstable_features_warning = true

[sandbox_workspace_write]
writable_roots = []
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

################################################################################
# Web Search (live mode for real-time results)
################################################################################

web_search = "live"

################################################################################
# Feature Flags (everything enabled)
################################################################################

[features]
undo = true
unified_exec = true
rmcp_client = true
shell_snapshot = true
apps = true
steer = true
multi_agent = true
voice_transcription = true
prevent_idle_sleep = true

[agents]
max_threads = 8

[agents.reviewer]
description = "Review-focused subagent. For every task, invoke $review first, then deliver findings."
config_file = "agents/reviewer.toml"

[agents.researcher]
description = "Research-focused subagent. For every task, invoke $research first, then summarize sources and recommendations."
config_file = "agents/researcher.toml"

[agents.fast_explorer]
description = "Fast explorer subagent for quick codebase investigation and concise findings."
config_file = "agents/fast-explorer.toml"

################################################################################
# Shell Environment Policy (inherit everything)
################################################################################

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true
exclude = []
set = {}
include_only = []
experimental_use_profile = true

################################################################################
# History (save everything)
################################################################################

[history]
persistence = "save-all"
# max_bytes = 0

################################################################################
# UI & Notifications
################################################################################

file_opener = "vscode"
check_for_update_on_startup = true

[tui]
notifications = true
animations = true
show_tooltips = true

[notice]
hide_full_access_warning = true
hide_world_writable_warning = true
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

