   - `PR: <url>`
   - `PR: none — <reason>` if no PR was created.

Rules:
- Do not create fallback solutions unless explicitly asked.
- If `gh` is unavailable, push fails, or PR creation fails, state the failure and still end with the required `PR:` line.
