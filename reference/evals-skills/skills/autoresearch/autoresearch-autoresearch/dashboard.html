<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoresearch Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #fbfbfd;
      --card: #ffffff;
      --ink: #203040;
      --muted: #5f6b7a;
      --border: #dbe4ee;
      --baseline: #7aa6ff;
      --keep: #7dc9a5;
      --discard: #ef9a9a;
    }
    body {
      margin: 0;
      padding: 24px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #fdfefe 0%, #f4f8fc 100%);
      color: var(--ink);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 12px 30px rgba(49, 78, 112, 0.08);
    }
    h1, h2 {
      margin: 0 0 12px;
      font-weight: 600;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .stat {
      padding: 14px;
      border-radius: 12px;
      background: #f7fafc;
      border: 1px solid var(--border);
    }
    .stat strong {
      display: block;
      font-size: 1.4rem;
      color: var(--ink);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .baseline { background: rgba(122, 166, 255, 0.18); color: #2d5fd0; }
    .keep { background: rgba(125, 201, 165, 0.22); color: #1d7b54; }
    .discard { background: rgba(239, 154, 154, 0.22); color: #b04343; }
    ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Autoresearch Dashboard</h1>
      <p id="status">Loading results...</p>
    </div>
    <div class="card stats" id="stats"></div>
    <div class="card">
      <h2>Score Progression</h2>
      <canvas id="scoreChart" height="120"></canvas>
    </div>
    <div class="card">
      <h2>Experiments</h2>
      <table>
        <thead>
          <tr>
            <th>Experiment</th>
            <th>Score</th>
            <th>Pass rate</th>
            <th>Status</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody id="experiments"></tbody>
      </table>
    </div>
    <div class="card">
      <h2>Per-eval Breakdown</h2>
      <ul id="breakdown"></ul>
    </div>
  </div>
  <script>
    let chart;

    function statusClass(status) {
      if (status === "keep") return "keep";
      if (status === "discard") return "discard";
      return "baseline";
    }

    function render(data) {
      document.getElementById("status").textContent =
        data.status === "running"
          ? `Running experiment ${data.current_experiment}...`
          : `Done. Baseline complete at ${data.best_score.toFixed(1)}% pass rate.`;

      const stats = [
        ["Skill", data.skill_name],
        ["Status", data.status],
        ["Current", `#${data.current_experiment}`],
        ["Baseline", `${data.baseline_score.toFixed(1)}%`],
        ["Best", `${data.best_score.toFixed(1)}%`]
      ];
      document.getElementById("stats").innerHTML = stats.map(([label, value]) =>
        `<div class="stat"><span>${label}</span><strong>${value}</strong></div>`
      ).join("");

      const tbody = document.getElementById("experiments");
      tbody.innerHTML = data.experiments.map(exp => `
        <tr>
          <td>${exp.id}</td>
          <td>${exp.score}/${exp.max_score}</td>
          <td>${exp.pass_rate.toFixed(1)}%</td>
          <td><span class="badge ${statusClass(exp.status)}">${exp.status}</span></td>
          <td>${exp.description}</td>
        </tr>
      `).join("");

      document.getElementById("breakdown").innerHTML = data.eval_breakdown.map(item =>
        `<li>${item.name}: ${item.pass_count}/${item.total}</li>`
      ).join("");

      const labels = data.experiments.map(exp => `#${exp.id}`);
      const scores = data.experiments.map(exp => exp.pass_rate);
      if (!chart) {
        chart = new Chart(document.getElementById("scoreChart"), {
          type: "line",
          data: {
            labels,
            datasets: [{
              label: "Pass rate %",
              data: scores,
              borderColor: "#6f9df6",
              backgroundColor: "rgba(111, 157, 246, 0.16)",
              fill: true,
              tension: 0.25
            }]
          },
          options: {
            responsive: true,
            scales: {
              y: {
                min: 0,
                max: 100
              }
            }
          }
        });
      } else {
        chart.data.labels = labels;
        chart.data.datasets[0].data = scores;
        chart.update();
      }
    }

    async function refresh() {
      const response = await fetch(`results.json?ts=${Date.now()}`);
      const data = await response.json();
      render(data);
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
